		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		%sveltekit.head%

		<!-- Twitter Card markup-->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:creator" content="@Star_Forge_Pool" />
		<meta name="twitter:url" content="https://adamantium.online" />
		<meta name="twitter:title" content="Star Forge Cardano Stake Pool" />

			name="twitter:image:alt"
			content="Star Forge [OTG] — Solar-powered, off-grid Cardano stake pool."
		/>

		<!-- Open Graph markup -->
		<meta property="og:url" content="https://adamantium.online/" />
		<meta property="og:type" content="website" />

			property="og:description"
			content="Star Forge [OTG] — Solar-powered, off-grid Cardano stake pool. Delegate ADA and earn rewards from a mobile, ARM64, Starlink-connected node operator."

		<meta property="og:site_name" content="Star Forge Cardano Stake Pool" />

		<script type="application/ld+json">

			"@context": "https://schema.org",
			"@type": "Organization",
			"name": "Star Forge Cardano Stake Pool",
			"alternateName": "OTG",
			"url": "https://adamantium.online",
			"logo": "https://adamantium.online/android-chrome-512x512.png",
			"description": "Solar-powered, ARM64, Starlink-connected Cardano stake pool operating off-grid since epoch 208.",
			"sameAs": [
				"https://twitter.com/Star_Forge_Pool",
				"https://github.com/wcatz",
				"https://t.me/StarForgeCardano",
				"https://discord.gg/jTcTKUYj64"
